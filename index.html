<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF スプリッター</title>
    
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <style>
        /* あなたが作ったきれいなデザインをすべて再現 */
        :root {
            --bg: #0e0e11; --surface: #18181e; --surface2: #22222c;
            --border: #2e2e3e; --accent: #7c6af5; --accent2: #e05fa0;
            --text: #f0f0f5; --muted: #8888a8; --success: #4ade80;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,245,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(224,95,160,0.08) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }
        .container { max-width: 860px; margin: 0 auto; padding: 48px 24px; position: relative; z-index: 1; }
        header { text-align: center; margin-bottom: 48px; }
        .logo {
            display: inline-flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Syne', sans-serif; font-size: 2.4rem; font-weight: 800;
        }
        .drop-zone {
            border: 2px dashed var(--border); border-radius: 20px;
            padding: 60px 32px; text-align: center; cursor: pointer;
            background: var(--surface); transition: 0.25s;
        }
        .drop-zone:hover { border-color: var(--accent); background: rgba(124,106,245,0.02); }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 28px; margin-bottom: 24px; }
        .btn-split {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-split:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,106,245,0.3); }
        input[type=number], input[type=text] {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); padding: 10px; width: 100%;
        }
        .file-info { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 24px; align-items: center; gap: 15px; }
        .file-info.show { display: flex; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .page-thumb { aspect-ratio: 3/4; background: var(--surface2); border-radius: 6px; border: 2px solid transparent; cursor: pointer; position: relative; overflow: hidden; }
        .page-thumb.selected { border-color: var(--accent); background: rgba(124,106,245,0.2); }
        .page-num { position: absolute; bottom: 0; width: 100%; text-align: center; background: rgba(0,0,0,0.6); font-size: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">✂️ PDF スプリッター</div>
        <p style="color:var(--muted)">PDFを自由にページ分割・抽出できるツール</p>
    </header>

    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div style="font-size: 3rem;">📄</div>
        <h3>PDFをドロップ または クリックして選択</h3>
        <input type="file" id="fileInput" accept=".pdf">
    </div>

    <div id="fileInfo" class="file-info">
        <div style="font-size: 2rem;">📄</div>
        <div style="flex:1">
            <div id="fileName" style="font-weight:bold"></div>
            <div id="filePages" style="color:var(--muted); font-size: 0.8rem;"></div>
        </div>
        <button onclick="location.reload()" style="background:none; border:1px solid var(--border); color:var(--muted); padding:5px 10px; border-radius:5px; cursor:pointer">クリア</button>
    </div>

    <div class="panel" id="mainPanel" style="display:none">
        <div style="margin-bottom:15px">
            <label>1ファイルあたりのページ数</label>
            <input type="number" id="splitSize" value="1" min="1">
        </div>
        <div id="pageGrid" class="preview-grid"></div>
    </div>

    <button class="btn-split" id="btnSplit" style="display:none">✂️ PDFを分割してダウンロード</button>
</div>

<script>
    // PDF.jsの準備（ここが修正のポイント！）
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let currentFile = null;
    let selectedPages = new Set();

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        currentFile = file;

        // 画面の表示を切り替え
        document.getElementById('dropZone').style.display = 'none';
        document.getElementById('fileInfo').className = 'file-info show';
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('btnSplit').style.display = 'block';
        document.getElementById('fileName').innerText = file.name;

        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        document.getElementById('filePages').innerText = pdf.numPages + " ページ";

        // サムネイル作成
        const grid = document.getElementById('pageGrid');
        grid.innerHTML = '';
        for (let i = 1; i <= pdf.numPages; i++) {
            const div = document.createElement('div');
            div.className = 'page-thumb selected';
            div.innerHTML = `<div class="page-num">${i}</div>`;
            div.onclick = () => {
                div.classList.toggle('selected');
                if (div.classList.contains('selected')) selectedPages.add(i);
                else selectedPages.delete(i);
            };
            selectedPages.add(i);
            grid.appendChild(div);
        }
    });

    document.getElementById('btnSplit').addEventListener('click', async () => {
        if (!currentFile) return;
        
        const arrayBuffer = await currentFile.arrayBuffer();
        const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
        const splitSize = parseInt(document.getElementById('splitSize').value);
        const zip = new JSZip();

        // 選択されたページだけで処理
        const pagesToProcess = Array.from(selectedPages).sort((a, b) => a - b);
        
        for (let i = 0; i < pagesToProcess.length; i += splitSize) {
            const newPdf = await PDFLib.PDFDocument.create();
            const chunk = pagesToProcess.slice(i, i + splitSize);
            
            const copiedPages = await newPdf.copyPages(pdfDoc, chunk.map(p => p - 1));
            copiedPages.forEach(page => newPdf.addPage(page));
            
            const pdfBytes = await newPdf.save();
            zip.file(`split_${i/splitSize + 1}.pdf`, pdfBytes);
        }

        const content = await zip.generateAsync({type: "blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = "output.zip";
        link.click();
    });
</script>

</body>
</html>
