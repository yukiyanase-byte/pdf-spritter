<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF スプリッター</title>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e11; --surface: #18181e; --surface2: #22222c; --border: #2e2e3e;
      --accent: #7c6af5; --accent2: #e05fa0; --text: #f0f0f5; --muted: #8888a8;
      --success: #4ade80; --warning: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,245,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse 40% 40% at 80% 80%, rgba(224,95,160,0.08) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    .container { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; position: relative; z-index: 1; }
    header { text-align: center; margin-bottom: 48px; }
    .logo { display: inline-flex; align-items: center; gap: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Syne', sans-serif; font-size: 2.4rem; font-weight: 800; }
    .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; -webkit-text-fill-color: white; }
    .subtitle { color: var(--muted); font-size: 0.95rem; margin-top: 8px; }

    /* Drop Zone */
    .drop-zone { border: 2px dashed var(--border); border-radius: 20px; padding: 60px 32px; text-align: center; cursor: pointer; transition: all 0.25s ease; background: var(--surface); margin-bottom: 32px; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(124,106,245,0.05); }
    .drop-icon { font-size: 3rem; margin-bottom: 16px; display: block; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .btn-browse { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; padding: 10px 28px; border-radius: 100px; cursor: pointer; font-weight: 500; margin-top: 15px; }

    /* File Info */
    .file-info { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; margin-bottom: 24px; align-items: center; gap: 14px; }
    .file-info.show { display: flex; }
    .file-thumb { width: 42px; height: 48px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .file-meta { flex: 1; }
    .btn-clear { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 8px; cursor: pointer; }

    /* Tabs & Panels */
    .mode-tabs { display: flex; gap: 8px; background: var(--surface); border-radius: 14px; padding: 6px; margin-bottom: 24px; border: 1px solid var(--border); }
    .mode-tab { flex: 1; padding: 10px; border: none; border-radius: 10px; background: transparent; color: var(--muted); cursor: pointer; font-weight: 500; }
    .mode-tab.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 28px; margin-bottom: 24px; }
    .input-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .input-group { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 150px; }
    input { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 10px 14px; outline: none; }
    
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 16px; max-height: 300px; overflow-y: auto; padding: 10px; background: var(--surface2); border-radius: 10px; }
    .page-thumb { aspect-ratio: 3/4; background: #000; border-radius: 4px; border: 2px solid transparent; cursor: pointer; position: relative; }
    .page-thumb.selected { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .page-thumb canvas { width: 100%; height: 100%; object-fit: contain; }
    .page-num { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); font-size: 10px; text-align: center; }

    /* Buttons & Progress */
    .btn-split { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; font-size: 1.1rem; }
    .btn-split:disabled { opacity: 0.3; cursor: not-allowed; }
    .progress-wrap { display: none; margin-top: 20px; }
    .progress-bar-bg { background: var(--surface2); height: 8px; border-radius: 10px; overflow: hidden; margin-top: 8px; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 0%; transition: width 0.3s; }

    /* Results */
    .result-list { display: none; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
    .result-list.show { display: block; }
    .result-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .btn-dl { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    .btn-dl-all { background: var(--surface2); border: 1px solid var(--accent); color: var(--text); padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: bold; }
    .btn-dl-all:hover { background: var(--accent); }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--accent); padding: 12px 25px; border-radius: 50px; display: none; z-index: 1000; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo"><div class="logo-icon">✂️</div> PDF スプリッター</div>
    <p class="subtitle">高度なページ分割・抽出ツール</p>
  </header>

  <div class="drop-zone" id="dropZone">
    <span class="drop-icon">📄</span>
    <div class="drop-title">ここにPDFをドロップ</div>
    <button class="btn-browse" onclick="document.getElementById('fileInput').click()">またはファイルを選択</button>
    <input type="file" id="fileInput" accept=".pdf" style="display:none">
  </div>

  <div class="file-info" id="fileInfo">
    <div class="file-thumb">PDF</div>
    <div class="file-meta">
      <div id="fileName" class="file-name"></div>
      <div id="filePages" class="file-pages"></div>
    </div>
    <button class="btn-clear" onclick="location.reload()">クリア</button>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('pages')" id="tab-pages">ページ数で分割</button>
    <button class="mode-tab" onclick="switchMode('range')" id="tab-range">範囲指定</button>
    <button class="mode-tab" onclick="switchMode('pick')" id="tab-pick">選択して抽出</button>
  </div>

  <div class="panel" id="panel-pages">
    <div class="input-row">
      <div class="input-group"><label>何ページごとに分割？</label><input type="number" id="splitEvery" value="1" min="1"></div>
      <div class="input-group"><label>ファイル名の頭文字</label><input type="text" id="prefix" value="split_"></div>
    </div>
  </div>

  <div class="panel" id="panel-range" style="display:none">
    <div class="input-row">
      <div class="input-group"><label>開始ページ</label><input type="number" id="rangeStart" value="1"></div>
      <div class="input-group"><label>終了ページ</label><input type="number" id="rangeEnd" value="1"></div>
    </div>
  </div>

  <div class="panel" id="panel-pick" style="display:none">
    <p style="font-size:0.8rem; color:var(--muted); margin-bottom:10px;">抽出したいページをクリックしてください</p>
    <div id="pageGrid" class="preview-grid"></div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div id="progressText">準備中...</div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <button class="btn-split" id="btnSplit" onclick="doSplit()" disabled>✂️ PDFを分割実行</button>

  <div class="result-list" id="resultList">
    <div style="color:var(--success); font-weight:bold; margin-bottom:15px;">✅ 分割完了</div>
    <div id="resultItems"></div>
    <button class="btn-dl-all" id="btnDlAll" onclick="downloadAll()" style="display:none">📦 すべてをZIPでダウンロード</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // PDF.js Worker設定（正しい場所）
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfFile, pdfDoc, pdfJsDoc, totalPages = 0;
  let currentMode = 'pages';
  let splitResults = [];
  let selectedPages = new Set();

  // ファイル読み込み処理
  document.getElementById('fileInput').addEventListener('change', e => { if(e.target.files[0]) loadFile(e.target.files[0]); });
  
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => { e.preventDefault(); loadFile(e.dataTransfer.files[0]); });

  async function loadFile(file) {
    if(!file || file.type !== 'application/pdf') return alert('PDFを選択してください');
    pdfFile = file;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileInfo').classList.add('show');
    document.getElementById('dropZone').style.display = 'none';
    
    const data = await file.arrayBuffer();
    pdfDoc = await PDFLib.PDFDocument.load(data);
    totalPages = pdfDoc.getPageCount();
    document.getElementById('filePages').textContent = totalPages + ' ページ';
    document.getElementById('rangeEnd').value = totalPages;
    
    pdfJsDoc = await pdfjsLib.getDocument({data}).promise;
    renderThumbnails();
    document.getElementById('btnSplit').disabled = false;
  }

  async function renderThumbnails() {
    const grid = document.getElementById('pageGrid');
    grid.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
      const div = document.createElement('div');
      div.className = 'page-thumb';
      const canvas = document.createElement('canvas');
      div.append(canvas, Object.assign(document.createElement('div'), {className:'page-num', textContent:i}));
      grid.appendChild(div);
      
      const page = await pdfJsDoc.getPage(i);
      const vp = page.getViewport({scale: 0.2});
      canvas.width = vp.width; canvas.height = vp.height;
      page.render({canvasContext: canvas.getContext('2d'), viewport: vp});
      
      div.onclick = () => {
        div.classList.toggle('selected');
        selectedPages.has(i) ? selectedPages.delete(i) : selectedPages.add(i);
      };
    }
  }

  function switchMode(mode) {
    currentMode = mode;
    ['pages','range','pick'].forEach(m => {
      document.getElementById('panel-'+m).style.display = m === mode ? '' : 'none';
      document.getElementById('tab-'+m).classList.toggle('active', m === mode);
    });
  }

  async function doSplit() {
    splitResults = [];
    document.getElementById('resultItems').innerHTML = '';
    document.getElementById('progressWrap').style.display = 'block';
    const btn = document.getElementById('btnSplit');
    btn.disabled = true;

    try {
      if (currentMode === 'pages') {
        const every = parseInt(document.getElementById('splitEvery').value) || 1;
        const pre = document.getElementById('prefix').value;
        for (let i = 0; i < totalPages; i += every) {
          const end = Math.min(i + every, totalPages);
          const newPdf = await PDFLib.PDFDocument.create();
          const copied = await newPdf.copyPages(pdfDoc, Array.from({length: end-i}, (_, k) => i+k));
          copied.forEach(p => newPdf.addPage(p));
          const bytes = await newPdf.save();
          splitResults.push({ name: `${pre}${i+1}-${end}.pdf`, blob: new Blob([bytes], {type:'application/pdf'}) });
          updateProgress(((i+every)/totalPages)*100);
        }
      } else if (currentMode === 'range') {
        const s = parseInt(document.getElementById('rangeStart').value) - 1;
        const e = parseInt(document.getElementById('rangeEnd').value);
        const newPdf = await PDFLib.PDFDocument.create();
        const copied = await newPdf.copyPages(pdfDoc, Array.from({length: e-s}, (_, k) => s+k));
        copied.forEach(p => newPdf.addPage(p));
        const bytes = await newPdf.save();
        splitResults.push({ name: `range_${s+1}-${e}.pdf`, blob: new Blob([bytes], {type:'application/pdf'}) });
      } else {
        if(selectedPages.size === 0) return alert('ページを選択してください');
        const newPdf = await PDFLib.PDFDocument.create();
        const sorted = Array.from(selectedPages).sort((a,b)=>a-b);
        const copied = await newPdf.copyPages(pdfDoc, sorted.map(p => p-1));
        copied.forEach(p => newPdf.addPage(p));
        const bytes = await newPdf.save();
        splitResults.push({ name: `selected_pages.pdf`, blob: new Blob([bytes], {type:'application/pdf'}) });
      }
      showResults();
    } catch (err) {
      alert('エラーが発生しました');
    }
    btn.disabled = false;
    document.getElementById('progressWrap').style.display = 'none';
  }

  function updateProgress(pct) {
    document.getElementById('progressBar').style.width = pct + '%';
  }

  function showResults() {
    const list = document.getElementById('resultItems');
    splitResults.forEach((r, i) => {
      const div = document.createElement('div');
      div.className = 'result-item';
      div.innerHTML = `<div style="flex:1; font-size:0.9rem;">${r.name}</div><button class="btn-dl" onclick="downloadOne(${i})">保存</button>`;
      list.appendChild(div);
    });
    document.getElementById('resultList').classList.add('show');
    document.getElementById('btnDlAll').style.display = splitResults.length > 1 ? 'block' : 'none';
  }

  function downloadOne(idx) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(splitResults[idx].blob);
    a.download = splitResults[idx].name;
    a.click();
  }

  async function downloadAll() {
    const zip = new JSZip();
    splitResults.forEach(r => zip.file(r.name, r.blob));
    const content = await zip.generateAsync({type: "blob"});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = "split_pdfs.zip";
    a.click();
    showToast('ZIPを作成しました');
  }

  function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }
</script>
</body>
</html>
