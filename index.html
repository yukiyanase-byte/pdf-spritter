<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF スプリッター</title>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e11;
    --surface: #18181e;
    --surface2: #22222c;
    --border: #2e2e3e;
    --accent: #7c6af5;
    --accent2: #e05fa0;
    --text: #f0f0f5;
    --muted: #8888a8;
    --success: #4ade80;
    --warning: #fbbf24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,245,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(224,95,160,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    -webkit-text-fill-color: white;
    flex-shrink: 0;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 20px;
    padding: 60px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    margin-bottom: 32px;
  }

  .drop-zone::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(124,106,245,0.05), rgba(224,95,160,0.05));
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
  }

  .drop-zone:hover,
  .drop-zone.drag-over {
    border-color: var(--accent);
  }

  .drop-zone:hover::after,
  .drop-zone.drag-over::after {
    opacity: 1;
  }

  .drop-zone.drag-over {
    transform: scale(1.01);
  }

  .drop-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .drop-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .drop-sub {
    color: var(--muted);
    font-size: 0.875rem;
    margin-bottom: 20px;
  }

  .btn-browse {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    padding: 10px 28px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn-browse:hover { opacity: 0.9; transform: scale(1.03); }

  #fileInput { display: none; }

  /* File info bar */
  .file-info {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 24px;
    align-items: center;
    gap: 14px;
  }

  .file-info.show { display: flex; }

  .file-thumb {
    width: 42px; height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .file-meta { flex: 1; }

  .file-name {
    font-weight: 500;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 400px;
  }

  .file-pages {
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 2px;
  }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-clear:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Mode tabs */
  .mode-tabs {
    display: flex;
    gap: 8px;
    background: var(--surface);
    border-radius: 14px;
    padding: 6px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }

  .mode-tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .mode-tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }

  /* Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: inline-block;
  }

  /* Input group */
  .input-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 120px;
  }

  label {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  input[type=number], input[type=text] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    width: 100%;
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--accent);
  }

  .hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Page preview */
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 8px;
    margin-top: 16px;
    max-height: 280px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .preview-grid::-webkit-scrollbar { width: 4px; }
  .preview-grid::-webkit-scrollbar-track { background: transparent; }
  .preview-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .page-thumb {
    aspect-ratio: 3/4;
    background: var(--surface2);
    border-radius: 6px;
    border: 2px solid transparent;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    overflow: hidden;
    position: relative;
    transition: all 0.15s;
  }

  .page-thumb:hover { border-color: var(--accent); }

  .page-thumb.selected {
    border-color: var(--accent);
    background: rgba(124,106,245,0.15);
  }

  .page-thumb canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .page-num {
    position: relative;
    z-index: 1;
    font-size: 0.65rem;
    background: rgba(0,0,0,0.7);
    width: 100%;
    text-align: center;
    padding: 2px 0;
  }

  .page-thumb.selected .page-num {
    background: var(--accent);
  }

  .select-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .btn-sm {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  /* Output filename */
  .output-name-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }

  .name-prefix {
    color: var(--muted);
    font-size: 0.85rem;
    white-space: nowrap;
  }

  /* Action button */
  .btn-split {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-split:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 8px 32px rgba(124,106,245,0.3); }
  .btn-split:active { transform: translateY(0); }
  .btn-split:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Progress */
  .progress-wrap {
    display: none;
    margin-bottom: 16px;
  }

  .progress-wrap.show { display: block; }

  .progress-bar-bg {
    background: var(--surface2);
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .progress-label {
    font-size: 0.8rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  /* Result list */
  .result-list {
    display: none;
    flex-direction: column;
    gap: 10px;
    margin-top: 24px;
  }

  .result-list.show { display: flex; }

  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--success);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.2s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-icon {
    font-size: 1.3rem;
  }

  .result-info { flex: 1; }

  .result-name {
    font-size: 0.9rem;
    font-weight: 500;
  }

  .result-pages {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .btn-dl {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    padding: 7px 18px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }
  .btn-dl:hover { opacity: 0.85; }

  .btn-dl-all {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    margin-top: 8px;
  }
  .btn-dl-all:hover { border-color: var(--accent); color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 0.875rem;
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: #ef4444; color: #ef4444; }
  .toast.success { border-color: var(--success); color: var(--success); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">✂️</div>
      PDF スプリッター
    </div>
    <p class="subtitle">PDFを自由にページ分割・抽出できるツール</p>
  </header>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <span class="drop-icon">📄</span>
    <div class="drop-title">PDFをドロップ</div>
    <div class="drop-sub">またはクリックして選択</div>
    <button class="btn-browse" onclick="document.getElementById(&#39;fileInput&#39;).click()">ファイルを選択</button>
    <input type="file" id="fileInput" accept=".pdf">
  </div>

  <!-- File info -->
  <div class="file-info show" id="fileInfo">
    <div class="file-thumb">📄</div>
    <div class="file-meta">
      <div class="file-name" id="fileName"></div>
<div class="file-pages" id="filePages"></div>
    </div>
    <button class="btn-clear" onclick="clearFile()">クリア</button>
  </div>

  <!-- Mode tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode(&#39;pages&#39;)" id="tab-pages">📑 ページ数で分割</button>
    <button class="mode-tab" onclick="switchMode(&#39;range&#39;)" id="tab-range">✂️ 範囲指定で分割</button>
    <button class="mode-tab" onclick="switchMode(&#39;pick&#39;)" id="tab-pick">🎯 ページを選んで抽出</button>
  </div>

  <!-- Mode: Pages -->
  <div class="panel" id="panel-pages">
    <div class="panel-title"><span></span>ページ数で均等分割</div>
    <div class="input-row">
      <div class="input-group">
        <label>分割単位（ページ数）</label>
        <input type="number" id="splitEvery" value="1" min="1" placeholder="例: 1" max="46">
      </div>
      <div class="input-group">
        <label>出力ファイル名（プレフィックス）</label>
        <input type="text" id="prefixPages" value="分割_" placeholder="例: 書類_">
      </div>
    </div>
    <div class="hint">例：10ページのPDFを「2ページごと」→ 5ファイルに分割</div>
  </div>

  <!-- Mode: Range -->
  <div class="panel" id="panel-range" style="display:none">
    <div class="panel-title"><span></span>範囲指定で分割</div>
    <div class="input-row">
      <div class="input-group">
        <label>開始ページ</label>
        <input type="number" id="rangeStart" value="1" min="1" placeholder="1" max="46">
      </div>
      <div class="input-group">
        <label>終了ページ</label>
        <input type="number" id="rangeEnd" value="1" min="1" placeholder="1" max="46">
      </div>
      <div class="input-group">
        <label>出力ファイル名</label>
        <input type="text" id="rangeFilename" value="抽出ページ" placeholder="ファイル名">
      </div>
    </div>
    <div class="hint">指定した範囲のページだけを1つのPDFとして保存します</div>
  </div>

  <!-- Mode: Pick -->
  <div class="panel" id="panel-pick" style="display:none">
    <div class="panel-title"><span></span>ページを選んで抽出</div>
    <div class="hint" style="margin-bottom:12px">サムネイルをクリックして抽出したいページを選択してください</div>
   <div id="pageGrid" class="preview-grid"></div><div class="select-bar" id="selectBar" style="display: flex;">
      <button class="btn-sm" onclick="selectAll()">すべて選択</button>
      <button class="btn-sm" onclick="selectNone()">選択解除</button>
      <button class="btn-sm" onclick="selectOdd()">奇数ページ</button>
      <button class="btn-sm" onclick="selectEven()">偶数ページ</button>
    </div>
    <div class="input-group" style="margin-top:16px; max-width:260px">
      <label>出力ファイル名</label>
      <input type="text" id="pickFilename" value="選択ページ" placeholder="ファイル名">
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">46/46 作成中...</span>
      <span id="progressPct">100%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
    </div>
  </div>

  <!-- Action -->
  <button class="btn-split" id="btnSplit" onclick="doSplit()">
    ✂️ PDFを分割する
  </button>

  <!-- Results -->
<div class="result-list" id="resultList">
  <div class="result-title">✅ 完了！ダウンロードしてください</div>
  <div id="resultItems"></div>
</div>
        <button class="btn-dl" onclick="downloadOne(45)">⬇ DL</button>
      </div></div>
    <button class="btn-dl-all" id="btnDlAll" onclick="downloadAll()">📦 すべてをまとめてダウンロード（ZIP）</button>
  </div>
</div>

<div class="toast success" id="toast">✅ ZIPダウンロード完了！</div>

<script>
  // PDF.js worker
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfFile = null;
  let pdfDoc = null; // pdf-lib
  let pdfJsDoc = null; // pdf.js
  let totalPages = 0;
  let currentMode = 'pages';
  let selectedPages = new Set();
  let splitResults = []; // {name, blob}

  // ---- Drop Zone ----
  const dropZone = document.getElementById('dropZone');

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') loadFile(f);
    else showToast('PDFファイルを選択してください', 'error');
  });
  dropZone.addEventListener('click', () => document.getElementById('fileInput').click());

  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  async function loadFile(file) {
    pdfFile = file;
    const fi = document.getElementById('fileInfo');
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('filePages').textContent = '読み込み中...';
    fi.classList.add('show');
    dropZone.style.display = 'none';

    const arrayBuffer = await file.arrayBuffer();

    // pdf-lib
    pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
    totalPages = pdfDoc.getPageCount();
    document.getElementById('filePages').textContent = `${totalPages} ページ`;

    // Update range defaults
    document.getElementById('rangeEnd').value = totalPages;
    document.getElementById('rangeEnd').max = totalPages;
    document.getElementById('rangeStart').max = totalPages;
    document.getElementById('splitEvery').max = totalPages;

    // pdf.js for thumbnails
    pdfJsDoc = await pdfjsLib.getDocument({data: arrayBuffer}).promise;

    // Render thumbnails
    await renderThumbnails();

    document.getElementById('btnSplit').disabled = false;
    document.getElementById('resultList').classList.remove('show');
    document.getElementById('resultItems').innerHTML = '';
    splitResults = [];
  }

  async function renderThumbnails() {
    const grid = document.getElementById('pageGrid');
    grid.innerHTML = '';
    selectedPages.clear();

    for (let i = 1; i <= totalPages; i++) {
      const thumb = document.createElement('div');
      thumb.className = 'page-thumb';
      thumb.dataset.page = i;

      const canvas = document.createElement('canvas');
      const numEl = document.createElement('div');
      numEl.className = 'page-num';
      numEl.textContent = i;

      thumb.appendChild(canvas);
      thumb.appendChild(numEl);
      thumb.addEventListener('click', () => togglePage(i, thumb));
      grid.appendChild(thumb);

      // Render page asynchronously
      renderPageThumb(i, canvas);
    }

    document.getElementById('selectBar').style.display = 'flex';
  }

  async function renderPageThumb(pageNum, canvas) {
    try {
      const page = await pdfJsDoc.getPage(pageNum);
      const vp = page.getViewport({scale: 0.3});
      canvas.width = vp.width;
      canvas.height = vp.height;
      await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
    } catch(e) {}
  }

  function togglePage(num, el) {
    if (selectedPages.has(num)) {
      selectedPages.delete(num);
      el.classList.remove('selected');
    } else {
      selectedPages.add(num);
      el.classList.add('selected');
    }
  }

  function selectAll() {
    for (let i = 1; i <= totalPages; i++) {
      selectedPages.add(i);
      document.querySelector(`.page-thumb[data-page="${i}"]`)?.classList.add('selected');
    }
  }

  function selectNone() {
    selectedPages.clear();
    document.querySelectorAll('.page-thumb').forEach(t => t.classList.remove('selected'));
  }

  function selectOdd() {
    selectNone();
    for (let i = 1; i <= totalPages; i += 2) {
      selectedPages.add(i);
      document.querySelector(`.page-thumb[data-page="${i}"]`)?.classList.add('selected');
    }
  }

  function selectEven() {
    selectNone();
    for (let i = 2; i <= totalPages; i += 2) {
      selectedPages.add(i);
      document.querySelector(`.page-thumb[data-page="${i}"]`)?.classList.add('selected');
    }
  }

  function clearFile() {
    pdfFile = null; pdfDoc = null; pdfJsDoc = null; totalPages = 0;
    selectedPages.clear();
    document.getElementById('fileInfo').classList.remove('show');
    document.getElementById('dropZone').style.display = '';
    document.getElementById('btnSplit').disabled = true;
    document.getElementById('pageGrid').innerHTML = '<div style="color: var(--muted); font-size: 0.85rem; padding: 16px;">PDFを読み込むとサムネイルが表示されます</div>';
    document.getElementById('selectBar').style.display = 'none';
    document.getElementById('resultList').classList.remove('show');
    document.getElementById('fileInput').value = '';
    splitResults = [];
  }

  // ---- Mode switch ----
  function switchMode(mode) {
    currentMode = mode;
    ['pages','range','pick'].forEach(m => {
      document.getElementById(`panel-${m}`).style.display = m === mode ? '' : 'none';
      document.getElementById(`tab-${m}`).classList.toggle('active', m === mode);
    });
  }

  // ---- Split ----
  async function doSplit() {
    if (!pdfDoc) return;

    document.getElementById('btnSplit').disabled = true;
    document.getElementById('progressWrap').classList.add('show');
    document.getElementById('resultList').classList.remove('show');
    document.getElementById('resultItems').innerHTML = '';
    splitResults = [];

    try {
      if (currentMode === 'pages') await splitByPages();
      else if (currentMode === 'range') await splitByRange();
      else await splitByPick();

      showResults();
    } catch(e) {
      showToast('エラーが発生しました: ' + e.message, 'error');
    }

    document.getElementById('progressWrap').classList.remove('show');
    document.getElementById('btnSplit').disabled = false;
  }

  function setProgress(val, text) {
    document.getElementById('progressBar').style.width = val + '%';
    document.getElementById('progressPct').textContent = Math.round(val) + '%';
    document.getElementById('progressText').textContent = text;
  }

  async function splitByPages() {
    const every = parseInt(document.getElementById('splitEvery').value) || 1;
    const prefix = document.getElementById('prefixPages').value || '分割_';
    const baseName = pdfFile.name.replace(/\.pdf$/i, '');
    let fileNum = 1;
    const total = Math.ceil(totalPages / every);

    for (let start = 0; start < totalPages; start += every) {
      const end = Math.min(start + every, totalPages);
      setProgress((fileNum / total) * 100, `${fileNum}/${total} 作成中...`);

      const newPdf = await PDFLib.PDFDocument.create();
      const pages = await newPdf.copyPages(pdfDoc, Array.from({length: end - start}, (_, i) => start + i));
      pages.forEach(p => newPdf.addPage(p));

      const bytes = await newPdf.save();
      const name = `${prefix}${String(fileNum).padStart(3,'0')}_${baseName}_p${start+1}-${end}.pdf`;
      splitResults.push({name, blob: new Blob([bytes], {type:'application/pdf'}), pages: `${start+1}〜${end}ページ`});
      fileNum++;
    }
  }

  async function splitByRange() {
    const start = parseInt(document.getElementById('rangeStart').value) - 1;
    const end = parseInt(document.getElementById('rangeEnd').value);
    const filename = (document.getElementById('rangeFilename').value || '抽出ページ') + '.pdf';

    if (start < 0 || end > totalPages || start >= end) {
      throw new Error(`ページ範囲が正しくありません（1〜${totalPages}）`);
    }

    setProgress(50, '抽出中...');
    const newPdf = await PDFLib.PDFDocument.create();
    const pages = await newPdf.copyPages(pdfDoc, Array.from({length: end - start}, (_, i) => start + i));
    pages.forEach(p => newPdf.addPage(p));
    const bytes = await newPdf.save();
    splitResults.push({name: filename, blob: new Blob([bytes], {type:'application/pdf'}), pages: `${start+1}〜${end}ページ`});
    setProgress(100, '完了');
  }

  async function splitByPick() {
    if (selectedPages.size === 0) throw new Error('ページを選択してください');
    const filename = (document.getElementById('pickFilename').value || '選択ページ') + '.pdf';
    const sorted = [...selectedPages].sort((a, b) => a - b);

    setProgress(50, '抽出中...');
    const newPdf = await PDFLib.PDFDocument.create();
    const pages = await newPdf.copyPages(pdfDoc, sorted.map(p => p - 1));
    pages.forEach(p => newPdf.addPage(p));
    const bytes = await newPdf.save();
    splitResults.push({name: filename, blob: new Blob([bytes], {type:'application/pdf'}), pages: sorted.join(', ') + 'ページ'});
    setProgress(100, '完了');
  }

  function showResults() {
    const list = document.getElementById('resultItems');
    splitResults.forEach((r, i) => {
      const item = document.createElement('div');
      item.className = 'result-item';
      item.style.animationDelay = (i * 0.05) + 's';
      item.innerHTML = `
        <div class="result-icon">📄</div>
        <div class="result-info">
          <div class="result-name">${r.name}</div>
          <div class="result-pages">${r.pages}</div>
        </div>
        <button class="btn-dl" onclick="downloadOne(${i})">⬇ DL</button>
      `;
      list.appendChild(item);
    });

    document.getElementById('btnDlAll').style.display = splitResults.length > 1 ? '' : 'none';
    document.getElementById('resultList').classList.add('show');
    showToast(`✅ ${splitResults.length}ファイル作成完了！`, 'success');
  }

  function downloadOne(idx) {
    const r = splitResults[idx];
    // base64に変換してダウンロード（ローカルHTMLでも動作）
    const reader = new FileReader();
    reader.onload = function(e) {
      const a = document.createElement('a');
      a.href = e.target.result;
      a.download = r.name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    };
    reader.readAsDataURL(r.blob);
  }

  async function downloadAll() {
    showToast('📦 ZIP作成中...');
    document.getElementById('btnDlAll').disabled = true;
    document.getElementById('btnDlAll').textContent = '⏳ ZIP作成中...';

    const zip = new JSZip();
    for (const r of splitResults) {
      const arrayBuffer = await r.blob.arrayBuffer();
      zip.file(r.name, arrayBuffer);
    }

    const zipBlob = await zip.generateAsync({type: 'blob'});
    const reader = new FileReader();
    reader.onload = function(e) {
      const a = document.createElement('a');
      a.href = e.target.result;
      a.download = '分割PDF.zip';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      document.getElementById('btnDlAll').disabled = false;
      document.getElementById('btnDlAll').textContent = '📦 すべてをまとめてダウンロード（ZIP）';
      showToast('✅ ZIPダウンロード完了！', 'success');
    };
    reader.readAsDataURL(zipBlob);
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
 

</body></html>
